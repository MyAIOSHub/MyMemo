name: Setup buildx + registry login
description: >-
  Free disk space, set up Docker Buildx, log in to GHCR, and conditionally
  log in to Docker Hub. Replaces ~40 lines of duplicated steps that were
  copy-pasted across build-and-release.yml and build-dev.yml.

inputs:
  cache-key-prefix:
    description: Prefix for the buildx cache key (e.g. "regular", "single", "dev")
    required: true
  has-dockerhub-secrets:
    description: '"true" or "false" — whether Docker Hub creds are available'
    required: true
  dockerhub-username:
    description: Docker Hub username (only used when has-dockerhub-secrets is true)
    required: false
  dockerhub-password:
    description: Docker Hub password (only used when has-dockerhub-secrets is true)
    required: false

runs:
  using: composite
  steps:
    - name: Free up disk space
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        df -h

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Login to Docker Hub
      if: ${{ inputs.has-dockerhub-secrets == 'true' }}
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-password }}

    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache-${{ inputs.cache-key-prefix }}
        key: ${{ runner.os }}-buildx-${{ inputs.cache-key-prefix }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-${{ inputs.cache-key-prefix }}-

services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root  # Required for bind mounts on Linux
    ports:
      - "8000:8000"
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: always
    pull_policy: always

  mymemo:
    image: myaioshub/mymemo:v1-latest
    ports:
      - "5055:5055"  # REST API (memory proxy + source store + credentials)
    environment:
      # REQUIRED: Fernet-safe secret for encrypting stored credentials.
      # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Falls back to the legacy OPEN_NOTEBOOK_ENCRYPTION_KEY name with a
      # deprecation warning if MYMEMO_ENCRYPTION_KEY isn't set.
      - MYMEMO_ENCRYPTION_KEY=${MYMEMO_ENCRYPTION_KEY:-${OPEN_NOTEBOOK_ENCRYPTION_KEY:?set MYMEMO_ENCRYPTION_KEY in .env}}

      # Memory Hub URL — point to the EverCore gateway on port 1995.
      # Leave as localhost if Memory Hub runs on the host; override for remote.
      - MEMORY_HUB_URL=${MEMORY_HUB_URL:-http://host.docker.internal:1995}
      - MEMORY_HUB_USER_ID=${MEMORY_HUB_USER_ID:-mymemo_user}

      # SurrealDB connection (stores memory snapshots as Source records)
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=${SURREAL_USER:-root}
      - SURREAL_PASSWORD=${SURREAL_PASSWORD:-root}
      - SURREAL_NAMESPACE=mymemo
      - SURREAL_DATABASE=mymemo
    volumes:
      - ./mymemo_data:/app/data
    depends_on:
      - surrealdb
    restart: always
    pull_policy: always
